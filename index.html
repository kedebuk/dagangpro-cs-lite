<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>CS Lite DagangPro</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f6f8;color:#111;font-family:Arial,system-ui,sans-serif;font-size:15px}.app{max-width:560px;margin:auto;padding:10px 10px 80px}.top{position:sticky;top:0;background:#f4f6f8;padding:10px 0 8px;border-bottom:1px solid #ddd;z-index:2}h1{font-size:20px;margin:0}.muted{color:#667085;font-size:12px}.bar{display:block;margin-top:9px}input,select,button{width:100%;font:inherit;border:1px solid #cfd4dc;border-radius:12px;padding:12px;background:#fff;margin:0 0 8px}button{font-weight:800;min-height:48px}.green{background:#14a44d;color:#fff;border-color:#14a44d}.blue{background:#2563eb;color:#fff;border-color:#2563eb}.card{background:#fff;border:1px solid #e5e7eb;border-radius:15px;padding:12px;margin:10px 0}.name{font-weight:900;font-size:17px}.prod{font-weight:800;margin-top:8px}.line{margin-top:5px;color:#344054;font-size:13px;line-height:1.4}.pill{display:inline-block;margin:6px 4px 0 0;padding:4px 8px;border-radius:99px;background:#eef2ff;color:#3730a3;font-size:11px;font-weight:800}.paid{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.done{background:#e7f8ee;color:#166534}.act{display:block;margin-top:10px}.act a,.act button{display:block;width:100%;text-align:center;text-decoration:none;border-radius:12px;padding:12px;margin:0 0 8px;font-weight:900;border:1px solid #d0d5dd;min-height:48px}.wa{background:#16a34a;color:#fff!important;border-color:#16a34a!important}.copy{background:#eff6ff;color:#1d4ed8}.ok{background:#f0fdf4;color:#166534}.empty,.lock{background:#fff;border:1px dashed #cfd4dc;border-radius:15px;padding:18px;text-align:center;color:#667085;margin-top:12px}.toast{position:fixed;left:10px;right:10px;bottom:10px;background:#111827;color:#fff;padding:12px;border-radius:12px;text-align:center;font-weight:800;display:none;z-index:9}.toast.on{display:block}.hide{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1>CS Lite DagangPro</h1>
    <div class="muted" id="info">HTML ringan • sync VPS • v7-native-form</div>
    <form class="bar hide" id="filters" action="" method="get">
      <input id="q" name="q" placeholder="Cari nama / WA / produk">
      <select id="day" name="day"><option value="today">Hari ini</option><option value="yesterday">Kemarin</option><option value="all">Semua hari</option><option value="custom">Tanggal manual</option></select>
      <input id="date" name="date" placeholder="Tanggal manual: 2026-05-28">
      <select id="type" name="type"><option value="">Semua produk</option><option value="physical">Produk fisik</option><option value="digital">Produk digital</option></select>
      <select id="fu" name="fu"><option value="needed">Perlu FU</option><option value="">Semua order</option></select>
      <button type="submit" class="blue" id="refresh">Refresh</button>
      <button type="button" id="today">Reset Hari Ini</button>
    </form>
  </div>
  <div id="list"></div>
  <div id="empty" class="empty hide">Tidak ada order.</div>
</div>
<div class="toast" id="toast"></div>
<script>
(function(){
  var API='https://api-63f81986.dagangpro.online/v1/cs-lite';
  var orders=[];
  function el(id){return document.getElementById(id)}
  function show(x){x.className=x.className.replace(/\bhide\b/g,'')}
  function hide(x){if(x.className.indexOf('hide')<0)x.className+=' hide'}
  function text(x,t){x.textContent=t}
  function toast(t){var a=el('toast');a.textContent=t;a.className='toast on';setTimeout(function(){a.className='toast'},1700)}
  function esc(s){s=String(s==null?'':s);return s.replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function rp(n){n=Number(n||0);try{return new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(n)}catch(e){return 'Rp '+n}}
  function tgl(v){if(!v)return '-';try{return new Intl.DateTimeFormat('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(v))}catch(e){return String(v).slice(0,16)}}
  function oid(o){return o.merchant_order_id||o.id||'-'}
  function paid(o){var s=String(o.payment_status||'').toLowerCase();return s==='paid'||s==='completed'}
  function need(o){return o.cs_followup_status!=='done'}
  function hp(p){var n=String(p||'').replace(/\D/g,'');if(n.charAt(0)==='0')n='62'+n.slice(1);if(n.charAt(0)==='8')n='62'+n;return n}
  function fuText(o){var nm=o.customer_name?' '+o.customer_name:'',pr=o.product_name||'pesanan Kakak';if(paid(o))return 'Halo'+nm+', pesanan '+pr+' dengan Order ID '+oid(o)+' sudah kami terima pembayarannya. Tim kami sedang proses ya. Terima kasih 🙏';return 'Halo'+nm+', kami follow-up pesanan '+pr+' dengan Order ID '+oid(o)+'. Total '+rp(o.total_amount)+'. Mohon konfirmasi data penerima dan alamatnya sudah benar ya 🙏'}
  function addr(o){return [o.customer_address,o.customer_district,o.customer_city].filter(function(x){return !!x}).join(', ')||'-'}
  function dataText(o){return ['Order: '+oid(o),'Nama: '+(o.customer_name||'-'),'WA: '+(o.customer_phone||'-'),'Produk: '+(o.product_name||'-'),'Total: '+rp(o.total_amount),'Status: '+(o.status||'-')+' / '+(o.payment_status||'-'),'Alamat: '+addr(o)].join('\n')}
  function copy(s){var ta=document.createElement('textarea');ta.value=s;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('Disalin')}catch(e){toast('Copy manual ya')}document.body.removeChild(ta)}
  function xhr(method,url,body,cb){var r=new XMLHttpRequest();r.open(method,url,true);r.timeout=10000;if(body)r.setRequestHeader('content-type','application/json');r.onreadystatechange=function(){if(r.readyState===4){var j=null;try{j=JSON.parse(r.responseText||'{}')}catch(e){}cb(r.status,j)}};r.ontimeout=function(){cb(0,{error:'timeout'})};r.onerror=function(){cb(0,{error:'network'})};r.send(body||null)}
  function isoDate(offset){var d=new Date();d.setDate(d.getDate()+offset);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
  function selectedDate(){var v=el('day').value;if(v==='today')return isoDate(0);if(v==='yesterday')return isoDate(-1);if(v==='custom')return el('date').value;return ''}
  function param(name){var q=location.search.replace(/^\?/, '').split('&');for(var i=0;i<q.length;i++){var kv=q[i].split('=');if(decodeURIComponent(kv[0]||'')===name)return decodeURIComponent((kv[1]||'').replace(/\+/g,' '))}return ''}
  function applyUrlFilters(){var v;v=param('q');if(v)el('q').value=v;v=param('day');if(v)el('day').value=v;v=param('date');if(v)el('date').value=v;v=param('type');if(v)el('type').value=v;v=param('fu');if(param('fu')!==''||location.search.indexOf('fu=')>=0)el('fu').value=v}
  function goToday(){location.href=location.pathname+'?v=7&day=today&fu=needed'}
  function render(){var html='',i,o;for(i=0;i<orders.length;i++){o=orders[i];html+='<div class="card"><div class="name">'+esc(o.customer_name||'Tanpa nama')+'</div><div class="muted">'+esc(o.customer_phone||'-')+' • '+tgl(o.created_at)+'</div><div class="prod">'+esc(o.product_name||'-')+'</div><div class="line">Order: '+esc(oid(o))+'<br>Total: <b>'+rp(o.total_amount)+'</b><br>'+esc(addr(o))+'</div><span class="pill '+(paid(o)?'paid':'warn')+'">'+esc(o.payment_status||'-')+'</span><span class="pill '+(need(o)?'warn':'done')+'">'+(need(o)?'Perlu FU':'Sudah FU')+'</span><div class="act"><a class="wa" href="https://wa.me/'+hp(o.customer_phone)+'?text='+encodeURIComponent(fuText(o))+'" target="_blank">Chat WA</a><button type="button" class="copy" data-a="m" data-id="'+esc(o.id)+'">Copy template</button><button type="button" class="copy" data-a="d" data-id="'+esc(o.id)+'">Copy data</button><button type="button" class="ok" data-a="ok" data-id="'+esc(o.id)+'">Sudah FU</button></div></div>'}
    el('list').innerHTML=html;orders.length?hide(el('empty')):show(el('empty'))}
  function load(){show(el('filters'));text(el('info'),'Sync...');var p='limit=120',sd=selectedDate();if(el('q').value)p+='&q='+encodeURIComponent(el('q').value);if(sd)p+='&date='+encodeURIComponent(sd);if(el('type').value)p+='&type='+encodeURIComponent(el('type').value);if(el('fu').value)p+='&followup='+encodeURIComponent(el('fu').value);xhr('GET',API+'/orders?'+p,null,function(st,j){if(st===401){text(el('info'),'Akses ditolak dari browser ini');toast('Akses ditolak');return}if(st!==200||!j||!j.ok){text(el('info'),'Sync gagal, pencet Refresh');toast('Sync gagal');return}orders=j.orders||[];render();text(el('info'),orders.length+' order • update '+tgl(j.server_time))})}
  function mark(id){xhr('PATCH',API+'/orders/'+encodeURIComponent(id)+'/followup',JSON.stringify({status:'done',by:'CS Lite'}),function(st,j){if(st===200&&j&&j.ok){toast('Sudah FU');load()}else toast('Gagal update')})}
  function find(id){for(var i=0;i<orders.length;i++)if(orders[i].id===id)return orders[i];return {}}
  applyUrlFilters();el('today').onclick=goToday;el('day').onchange=function(){if(el('day').value!=='custom')el('date').value=''};el('date').onkeyup=function(e){e=e||window.event;if(e.keyCode===13){el('day').value='custom';el('filters').submit()}};el('list').onclick=function(e){e=e||window.event;var t=e.target||e.srcElement;if(!t.getAttribute)return;var id=t.getAttribute('data-id'),a=t.getAttribute('data-a'),o;if(!id)return;o=find(id);if(a==='ok')mark(id);if(a==='m')copy(fuText(o));if(a==='d')copy(dataText(o))};load();setInterval(load,30000);
})();
</script>
</body>
</html>
