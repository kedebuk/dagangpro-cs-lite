<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>CS Lite DagangPro</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f6f8;color:#111;font-family:system-ui,-apple-system,Segoe UI,sans-serif;font-size:15px}.app{max-width:560px;margin:auto;padding:10px 10px 76px}.top{position:sticky;top:0;background:#f4f6f8;padding:10px 0 8px;border-bottom:1px solid #e5e7eb;z-index:2}h1{font-size:20px;margin:0}.muted{color:#667085;font-size:12px}.bar{display:grid;gap:7px;margin-top:9px}input,select,button{width:100%;font:inherit;border:1px solid #d0d5dd;border-radius:12px;padding:10px;background:white}button{font-weight:800}.row{display:grid;grid-template-columns:1fr 1fr;gap:7px}.green{background:#14a44d;color:white;border-color:#14a44d}.blue{background:#2563eb;color:white;border-color:#2563eb}.card{background:white;border:1px solid #e5e7eb;border-radius:15px;padding:11px;margin:9px 0}.name{font-weight:900;font-size:16px}.prod{font-weight:800;margin-top:7px}.line{margin-top:4px;color:#344054;font-size:13px;line-height:1.35}.pill{display:inline-block;margin:5px 4px 0 0;padding:4px 8px;border-radius:99px;background:#eef2ff;color:#3730a3;font-size:11px;font-weight:800}.paid{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.done{background:#e7f8ee;color:#166534}.act{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}.act a,.act button{text-align:center;text-decoration:none;border-radius:12px;padding:10px;font-weight:900;border:1px solid #d0d5dd}.wa{background:#16a34a;color:white!important;border-color:#16a34a!important}.copy{background:#eff6ff;color:#1d4ed8}.ok{background:#f0fdf4;color:#166534}.empty,.lock{background:white;border:1px dashed #d0d5dd;border-radius:15px;padding:18px;text-align:center;color:#667085;margin-top:12px}.toast{position:fixed;left:10px;right:10px;bottom:10px;background:#111827;color:white;padding:12px;border-radius:12px;text-align:center;font-weight:800;display:none}.toast.on{display:block}@media(max-width:420px){.row,.act{grid-template-columns:1fr}body{font-size:14px}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1>CS Lite DagangPro</h1>
    <div class="muted" id="info">HTML ringan • sync VPS • v2-mobile</div>
    <div class="bar" id="filters" hidden>
      <input id="q" placeholder="Cari nama / WA / produk">
      <div class="row"><input id="date" type="date"><select id="fu"><option value="needed">Perlu FU</option><option value="">Semua order</option></select></div>
      <div class="row"><button class="blue" id="refresh">Refresh</button><button id="today">Hari ini</button></div>
    </div>
  </div>
  <div id="lock" class="lock" hidden>
    <b>Butuh secret link</b><br><br>
    <input id="keyin" placeholder="Tempel key kalau link tidak lengkap"><br><br>
    <button class="green" id="save">Buka</button>
  </div>
  <div id="list"></div>
  <div id="empty" class="empty" hidden>Tidak ada order.</div>
</div>
<div class="toast" id="toast"></div>
<script>
(()=>{const API='https://api-63f81986.dagangpro.online/v1/cs-lite';let key=localStorage.dp_cs_lite_key||'',orders=[];const $=id=>document.getElementById(id);const E=['info','filters','q','date','fu','refresh','today','lock','keyin','save','list','empty','toast'].reduce((a,id)=>(a[id]=$(id),a),{});function hash(){let p=new URLSearchParams(location.hash.slice(1)),k=p.get('key');if(k){key=k;localStorage.dp_cs_lite_key=k;history.replaceState(null,'',location.pathname)}}function msg(t){E.toast.textContent=t;E.toast.className='toast on';setTimeout(()=>E.toast.className='toast',1600)}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function rp(n){return new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(+n||0)}function tgl(v){return v?new Intl.DateTimeFormat('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(v)):'-'}function oid(o){return o.merchant_order_id||o.id||'-'}function paid(o){return ['paid','completed'].includes(String(o.payment_status||'').toLowerCase())}function need(o){return o.cs_followup_status!=='done'}function hp(p){let n=String(p||'').replace(/\D/g,'');if(n[0]==='0')n='62'+n.slice(1);if(n[0]==='8')n='62'+n;return n}function text(o){let nm=o.customer_name?' '+o.customer_name:'',pr=o.product_name||'pesanan Kakak';if(paid(o))return`Halo${nm}, pesanan ${pr} dengan Order ID ${oid(o)} sudah kami terima pembayarannya. Tim kami sedang proses ya. Terima kasih 🙏`;return`Halo${nm}, kami follow-up pesanan ${pr} dengan Order ID ${oid(o)}. Total ${rp(o.total_amount)}. Mohon konfirmasi data penerima dan alamatnya sudah benar ya 🙏`}function wa(o){return`https://wa.me/${hp(o.customer_phone)}?text=${encodeURIComponent(text(o))}`}function data(o){return[`Order: ${oid(o)}`,`Nama: ${o.customer_name||'-'}`,`WA: ${o.customer_phone||'-'}`,`Produk: ${o.product_name||'-'}`,`Total: ${rp(o.total_amount)}`,`Status: ${o.status||'-'} / ${o.payment_status||'-'}`,`Alamat: ${[o.customer_address,o.customer_district,o.customer_city].filter(Boolean).join(', ')||'-'}`].join('\n')}async function copy(s){await navigator.clipboard.writeText(s);msg('Disalin')}function render(){E.empty.hidden=orders.length;E.list.innerHTML=orders.map(o=>`<div class="card"><div class="name">${esc(o.customer_name||'Tanpa nama')}</div><div class="muted">${esc(o.customer_phone||'-')} • ${tgl(o.created_at)}</div><div class="prod">${esc(o.product_name||'-')}</div><div class="line">Order: ${esc(oid(o))}<br>Total: <b>${rp(o.total_amount)}</b><br>${esc([o.customer_address,o.customer_district,o.customer_city].filter(Boolean).join(', ')||'-')}</div><span class="pill ${paid(o)?'paid':'warn'}">${esc(o.payment_status||'-')}</span><span class="pill ${need(o)?'warn':'done'}">${need(o)?'Perlu FU':'Sudah FU'}</span><div class="act"><a class="wa" href="${wa(o)}" target="_blank">Chat WA</a><button class="copy" data-m="${esc(o.id)}">Copy template</button><button class="copy" data-d="${esc(o.id)}">Copy data</button><button class="ok" data-ok="${esc(o.id)}">Sudah FU</button></div></div>`).join('')}async function load(){if(!key){E.lock.hidden=false;E.filters.hidden=true;return}E.lock.hidden=true;E.filters.hidden=false;E.info.textContent='Sync...';let p=new URLSearchParams({limit:'200'});if(E.q.value)p.set('q',E.q.value);if(E.date.value)p.set('date',E.date.value);if(E.fu.value)p.set('followup',E.fu.value);try{let r=await fetch(`${API}/orders?${p}`,{headers:{'x-cs-lite-key':key},cache:'no-store'});if(r.status===401){delete localStorage.dp_cs_lite_key;key='';E.lock.hidden=false;E.filters.hidden=true;msg('Key salah');return}let j=await r.json();orders=j.orders||[];render();E.info.textContent=`${orders.length} order • update ${tgl(j.server_time)}`}catch(e){E.info.textContent='Sync gagal';msg('Sync gagal')}}async function done(id){let r=await fetch(`${API}/orders/${encodeURIComponent(id)}/followup`,{method:'PATCH',headers:{'content-type':'application/json','x-cs-lite-key':key},body:'{"status":"done","by":"CS Lite"}'});if(r.ok){msg('Sudah FU');load()}else msg('Gagal update')}E.save.onclick=()=>{key=E.keyin.value.trim();if(key){localStorage.dp_cs_lite_key=key;load()}};E.refresh.onclick=load;E.today.onclick=()=>{let d=new Date;d.setMinutes(d.getMinutes()-d.getTimezoneOffset());E.date.value=d.toISOString().slice(0,10);load()};E.q.onkeydown=e=>{if(e.key==='Enter')load()};E.date.onchange=E.fu.onchange=load;E.list.onclick=e=>{let id=e.target.dataset.ok||e.target.dataset.m||e.target.dataset.d;if(!id)return;let o=orders.find(x=>x.id===id);if(e.target.dataset.ok)return done(id);if(e.target.dataset.m)return copy(text(o));if(e.target.dataset.d)return copy(data(o))};hash();load();setInterval(load,30000)})();
</script>
</body>
</html>
